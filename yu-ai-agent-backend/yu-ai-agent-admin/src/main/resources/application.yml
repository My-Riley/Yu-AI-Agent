# 接口文档配置 (Swagger / Knife4j)
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.yuaiagent.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

# 第三方服务配置：搜索API
search-api:
  # 需要替换为你自己的 key
  api-key: 替换为您的API_KEY

# 日志配置
logging:
  level:
    # 开启 DEBUG 级别以便观察 Spring AI 的 Prompt 调用细节
    org.springframework.ai: DEBUG