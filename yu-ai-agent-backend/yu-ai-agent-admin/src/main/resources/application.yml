# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8123
  port: 8123
  servlet:
    # 应用的访问路径
    context-path: /api
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# Spring配置
spring:
  application:
    name: yu-ai-agent-admin
  profiles:
    # 临时注释掉，便于大家开发调试和部署（实际填写 PgVector 数据库信息）
    active: druid

  # AI 框架配置 (Spring AI)
  ai:
    # 阿里云百练 (DashScope)
    dashscope:
      # 替换为你自己的 API Key
      api-key: 替换为您的API_KYE
